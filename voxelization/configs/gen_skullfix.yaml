inherit_from: voxelization/configs/train_skullfix.yaml

train:
  gpu: 0  # GPU to use for inference

data:
  dset: SkullFix
  path: ${PCDIFF_SKULLFIX_RESULTS:-datasets/SkullFix/results/syn}  # Override: PCDIFF_SKULLFIX_RESULTS

generation:
  generation_dir: gen_skullfix
  num_ensemble: 5
  save_ensemble_implants: False
  compute_eval_metrics: True

test:
  model_file: ${PCDIFF_SKULLFIX_MODEL:-voxelization/out/skullfix/model_best.pt}  # Override: PCDIFF_SKULLFIX_MODEL