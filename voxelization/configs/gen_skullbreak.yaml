inherit_from: voxelization/configs/train_skullbreak.yaml

train:
  gpu: 0  # GPU to use for inference

data:
  dset: SkullBreak
  path: ${PCDIFF_SKULLBREAK_RESULTS:-datasets/SkullBreak/results/syn}  # Override: PCDIFF_SKULLBREAK_RESULTS

generation:
  generation_dir: gen_skullbreak
  num_ensemble: 5
  save_ensemble_implants: False
  compute_eval_metrics: True

test:
  model_file: ${PCDIFF_SKULLBREAK_MODEL:-voxelization/out/skullbreak/model_best.pt}  # Override: PCDIFF_SKULLBREAK_MODEL